<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebo IT Solutions — Premium Digital Experiences</title>
    <meta name="description" content="Nebo IT Solutions delivers high-performance digital experiences. Custom software, AI, cloud computing, and cybersecurity solutions tailored for enterprise scale." />
    <link rel="icon" type="image/png" href="/img/nebo_logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
      /* --- IT SOLUTIONS THEME VARIABLES (used by IT components) --- */
      :root {
        --it-bg-primary: #06060e;
        --it-bg-secondary: #0c0c1d;
        --it-text-main: #f0f0ff;
        --it-text-muted: #a5a5c0;
        --it-border: rgba(124, 58, 237, 0.12);
      }

      /* --- ENGINEERING SIDE VARIABLES (kept from old theme for NeboEngineering.tsx) --- */
      :root {
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --bg-subtle: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-subtle: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(15, 23, 42, 0.7);
        --scrollbar-track: #020617;
        --scrollbar-thumb: #1e293b;
      }

      /* Glass class for engineering side */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-subtle);
      }

      /* Engineering glass class */
      .it-glass {
        background: rgba(12, 12, 29, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(124, 58, 237, 0.12);
      }

      canvas {
        touch-action: none;
      }

      .theme-transition {
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
